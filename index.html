<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mailer</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="page-title">
        <div class="topbar">
          <div>
            <h1 id="page-title">Mailer</h1>
          </div>
        </div>

        <form id="campaign-form" class="composer" novalidate>
          <div class="field-group">
            <label for="subject">Subject</label>
            <input id="subject" name="subject" type="text" maxlength="160" autocomplete="off" placeholder="Quarterly update">
            <div class="field-meta">
              <span id="subject-count">0 / 160</span>
              <span id="subject-error" class="error-text" role="status"></span>
            </div>
          </div>

          <div class="field-group">
            <label for="recipients">Recipients</label>
            <textarea id="recipients" name="recipients" rows="7" spellcheck="false" placeholder="alex@example.com, sam@example.com&#10;jordan@example.com"></textarea>
            <div class="field-meta">
              <span id="recipient-summary">0 valid recipients</span>
              <span id="recipient-error" class="error-text" role="status"></span>
            </div>
          </div>

          <div class="field-group editor-group">
            <label for="editor">Message body</label>
            <div id="toolbar" aria-label="Message formatting controls">
              <span class="ql-formats">
                <select class="ql-header" aria-label="Text style">
                  <option selected></option>
                  <option value="2"></option>
                  <option value="3"></option>
                </select>
              </span>
              <span class="ql-formats">
                <button class="ql-bold" type="button" aria-label="Bold"></button>
                <button class="ql-italic" type="button" aria-label="Italic"></button>
                <button class="ql-underline" type="button" aria-label="Underline"></button>
              </span>
              <span class="ql-formats">
                <button class="ql-link" type="button" aria-label="Insert link"></button>
                <button class="ql-image" type="button" aria-label="Insert image"></button>
              </span>
              <span class="ql-formats">
                <button class="ql-list" value="ordered" type="button" aria-label="Ordered list"></button>
                <button class="ql-list" value="bullet" type="button" aria-label="Bulleted list"></button>
              </span>
              <span class="ql-formats">
                <button class="ql-clean" type="button" aria-label="Clear formatting"></button>
              </span>
            </div>
            <div id="editor" aria-label="Message body rich text editor"></div>
            <textarea id="body-fallback" class="fallback-editor" rows="12" placeholder="Write your email body here."></textarea>
            <div class="field-meta">
              <span id="body-summary">0 words</span>
              <span id="body-error" class="error-text" role="status"></span>
            </div>
          </div>

          <div class="actions">
            <button class="secondary-button" type="button" id="clear-button">Clear</button>
            <button class="primary-button" type="submit">Prepare Mails</button>
          </div>
        </form>
      </section>

      <aside class="inspector" aria-labelledby="inspector-title">
        <div class="inspector-header">
          <div>
            <p class="eyebrow">Review</p>
            <h2 id="inspector-title">Payload Preview</h2>
          </div>
          <span class="count-badge" id="recipient-count">0</span>
        </div>

        <dl class="stats">
          <div>
            <dt>Subject</dt>
            <dd id="subject-preview">Not set</dd>
          </div>
          <div>
            <dt>HTML size</dt>
            <dd id="html-size">0 bytes</dd>
          </div>
          <div>
            <dt>Queue estimate</dt>
            <dd id="queue-estimate">0 min</dd>
          </div>
        </dl>

        <div class="preview-panel">
          <h3>Email Preview</h3>
          <iframe id="email-preview" title="Rendered email preview" sandbox=""></iframe>
        </div>

        <div class="preview-panel">
          <div class="json-heading">
            <h3>API Payload</h3>
            <button class="icon-button" type="button" id="copy-payload" aria-label="Copy payload">Copy</button>
          </div>
          <pre id="payload-preview">{
  "recipients": [],
  "subject": "",
  "html": ""
}</pre>
        </div>

        <p class="submit-state" id="submit-state" role="status">Fill out the campaign fields to prepare a backend-ready payload.</p>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script src="app.js"></script>
  </body>
</html>
